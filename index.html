<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./assets/img/favicon.png" type="image/x-icon">
  <title>Canvas POO - Daniel Alonso</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Estilos -->
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark shadow">
    <div class="container-fluid">
      <span class="navbar-brand">🧪 Práctica Canvas</span>
      <span class="text-white">Daniel Alonso - ISC</span>
    </div>
  </nav>

  <!-- CONTENIDO -->
  <div class="container my-4">

    <div class="glass p-4">
      <h5 class="text-white mb-3">Configuración</h5>

      <div class="row g-3">

        <div class="col-md-3">
          <label class="form-label text-white">Cantidad</label>
          <input type="number" id="numCircles" class="form-control" min="1" max="100" value="5">
        </div>

        <div class="col-md-3">
          <label class="form-label text-white">Ancho</label>
          <input type="number" id="canvasWidth" class="form-control" value="600">
        </div>

        <div class="col-md-3">
          <label class="form-label text-white">Alto</label>
          <input type="number" id="canvasHeight" class="form-control" value="400">
        </div>

        <div class="col-md-3 d-flex align-items-end">
          <button class="btn btn-primary w-100" onclick="aplicarCambios()">Actualizar</button>
        </div>

      </div>
    </div>

    <!-- CANVAS -->
    <div class="glass p-3 mt-4 text-center">
      <canvas id="canvas"></canvas>
    </div>

  </div>

  <!-- FOOTER -->
  <footer class="footer text-white text-center p-3">
    <small>Práctica de POO con Canvas | Daniel Alonso</small>
  </footer>

  <script src="./assets/js/main.js"></script>
</body>
</html>
