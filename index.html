<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" href="./assets/img/favicon.png">
  <title>Canvas POO - Daniel Alonso</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>

<body>

<nav class="glass navbar navbar-dark shadow">
  <div class="container-fluid">
    <span class="navbar-brand">⚙️ Simulación 2D</span>
    <span class="text-white">Daniel Alonso - ISC</span>
  </div>
</nav>

<div class="container my-4">

  <div class="glass p-4">
    <h5 class="text-white mb-3">Configuración</h5>

    <div class="row g-3">

      <div class="col-md-3">
        <label class="form-label text-white">Cantidad</label>
        <input type="number" id="numCircles" class="form-control" value="5">
      </div>

      <div class="col-md-3">
        <label class="form-label text-white">Ancho</label>
        <input type="number" id="canvasWidth" class="form-control" value="600">
      </div>

      <div class="col-md-3">
        <label class="form-label text-white">Alto</label>
        <input type="number" id="canvasHeight" class="form-control" value="400">
      </div>

      <div class="col-md-3">
        <label class="form-label text-white">Dirección</label>
        <select id="direction" class="form-select">
          <option value="top">Arriba</option>
          <option value="left">Izquierda</option>
          <option value="right">Derecha</option>
          <option value="bottom">Abajo</option>
        </select>
      </div>

      <div class="col-md-3 d-flex align-items-end">
        <button class="btn btn-primary w-100" onclick="aplicarCambios()">Aplicar</button>
      </div>

    </div>
  </div>

  <div class="p-3 mt-4 text-center">
    <canvas id="canvas"></canvas>
  </div>

</div>

<footer class="footer text-white text-center p-3 glass">
  <small>Simulación física en Canvas | Daniel Alonso</small>
</footer>

<script src="./assets/js/main.js"></script>
</body>
</html>
